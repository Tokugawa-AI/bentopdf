<footer
  style="border-top: 1px solid #1f1f1f; padding: 2rem 1.5rem; text-align: center; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;"
  data-simple-footer="true"
>
  <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.625rem;">
    <img
      id="footer-logo"
      src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/favicon-no-bg.svg{{/if}}"
      alt="{{#if brandName}}{{brandName}}{{else}}PrivKit PDF{{/if}}"
      style="width: 22px; height: 22px; border-radius: 5px;"
    />
    <span id="footer-brand" style="font-weight: 700; font-size: 0.9375rem; color: #f5f5f5;">
      {{#if brandName}}{{brandName}}{{else}}PrivKit PDF{{/if}}
    </span>
  </div>
  <p id="footer-copyright" style="font-size: 0.875rem; color: #525252; margin: 0;">
    {{#if footerText}}{{footerText}}{{else}}&copy; 2026 PrivKit &middot; Tus archivos nunca salen de tu navegador{{/if}}
  </p>
  <p style="font-size: 0.75rem; color: #2a2a2a; margin: 0.375rem 0 0;">
    <span data-i18n="footer.version">v</span><span id="app-version">{{appVersion}}</span>
  </p>
  <div id="simple-mode-lang-switcher" style="margin-top: 1rem; display: flex; justify-content: center;"></div>
</footer>
