<nav
  style="border-bottom: 1px solid #1f1f1f; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; background: rgba(10,10,10,0.92); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50;"
  data-simple-nav="true"
>
  <a href="{{baseUrl}}" style="display: inline-flex; align-items: center; gap: 0.625rem; text-decoration: none;">
    <img
      id="nav-logo"
      src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/favicon-no-bg.svg{{/if}}"
      alt="{{#if brandName}}{{brandName}}{{else}}PrivKit PDF{{/if}} Logo"
      style="width: 28px; height: 28px; border-radius: 6px;"
    />
    <span id="nav-brand" style="font-weight: 700; font-size: 1.0625rem; color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;">
      {{#if brandName}}{{brandName}}{{else}}PrivKit PDF{{/if}}
    </span>
  </a>
  <div style="margin-left: auto; display: flex; align-items: center; gap: 0.625rem;">
    <span style="background: rgba(34,197,94,0.08); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); padding: 0 0.75rem; height: 30px; border-radius: 8px; font-size: 0.8125rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.3rem;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      100% local
    </span>
    <div id="simple-mode-lang-switcher-nav"></div>
  </div>
</nav>
